<html>
    <head>
        <title>Rock-Paper-Scissors-Game</title>
        <link rel=" stylesheet" href="style.css"/>
    
    </head>
    <body>
        <h1>Rock-Paper-Scissors-Game</h1>
        <div class="choices">
            <div class="choice" id="rock">
                <image src="image/WhatsApp Image 2025-08-22 at 7.33.04 PM.jpeg"></image>
            </div>
            <div class="choice" id="paper" >
                <image src="image/WhatsApp Image 2025-08-22 at 7.33.05 PM (1).jpeg"></image>
            </div>
            <div class="choice" id="scissors">
                <image src="image/WhatsApp Image 2025-08-22 at 7.33.05 PM.jpeg"></image>
            </div>
        </div>
        <div class="score_board">
            <div class="score">
                <p id="user">0</p>
                <p class="h">you</p>
            </div>
             <div class="score">
                <p id="comp">0</p>
                <p class="h">computer</p>
            </div>
        </div>
        <div class="msg-container">
            <p id="msg"> Play your Move</p>
        </div>
    
    </body>
    <script src="script.js"></script>
</html>
